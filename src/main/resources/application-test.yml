spring:
  datasource:
    url: jdbc:mysql://localhost:3306/spaceres_test?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true
    username: test_user
    password: test_pass
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true

jwt:
  secret: test-secret-key-for-testing-only-minimum-256-bits-long-ok
  access-token-expiration: 1800000
  refresh-token-expiration: 604800000

google:
  drive:
    credentials-file: classpath:google-credentials-test.json
    backup-folder-id: test-folder-id
    application-name: SpaceReservationTest

logging:
  level:
    com.spaceres: DEBUG
    org.springframework.security: WARN
